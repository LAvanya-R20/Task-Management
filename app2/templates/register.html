<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        form {
            width: 400px;
            padding: 30px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
            color: #fff;
        }

        h2 {
            text-align: center;
            color: #00f7ff;
            margin-bottom: 20px;
        }

        h4 {
            margin-bottom: 5px;
            font-weight: normal;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid #00f7ff;
            border-radius: 8px;
            outline: none;
            background: transparent;
            color: white;
        }

        input::placeholder {
            color: #ccc;
        }

        input:focus {
            box-shadow: 0 0 8px #00f7ff;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #00f7ff;
            border: none;
            border-radius: 8px;
            color: black;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #00c6cc;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #00f7ff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<form method="post">
    {% csrf_token %}
    <h2> REGISTER PAGE </h2>

    <h4> USERNAME:</h4>
    <input type="text" name="u" placeholder="Enter username">

    <h4> EMAIL ID:</h4>
    <input type="text" name="e" placeholder="Enter email">

    <h4> MOBILE NUMBER:</h4>
    <input type="text" name="m" placeholder="Enter mobile number">

    <h4> Password: </h4>
    <input type="password" name="p" placeholder="Enter password">

    <button>SUBMIT</button>

    <a href="{% url 'l' %}">If old user, make login here</a>
</form>

</body>
</html>

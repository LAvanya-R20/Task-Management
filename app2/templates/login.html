<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        form {
            width: 350px;
            padding: 30px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            color: white;
        }

        h2 {
            text-align: center;
        }

        h4 {
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ff7eb3;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #ff4e9b;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: white;
            text-decoration: none;
        }

        p {
            text-align: center;
        }
    </style>
</head>

<body>

<form method="post">
    {% csrf_token %}
    <h2> LOGIN PAGE </h2>

    <h4> USERNAME / EMAILID / MOBILE NUMBER</h4>
    <input type="text" name="u" placeholder="Enter your details">

    <h4> Password: </h4>
    <input type="password" name="p" placeholder="Enter password">

    <button>SUBMIT</button>

    {% if error %}
    <p style="color: yellow;">{{error}}</p>
    {% endif %}

    <a href="{% url 'r' %}">If new user, click here</a>
</form>

</body>
</html>
